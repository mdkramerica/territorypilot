<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Login — RouteIQ</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="logo"><span>Route</span><span class="iq">IQ</span></div>
    <p class="subtitle" style="margin-bottom:2rem;">Welcome back. Log in to your account.</p>

    <div class="auth-card">
      <div class="error-msg" id="error"></div>
      <div class="success-msg" id="success"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Log In</button>
      </form>

      <div class="divider">or</div>

      <button class="btn-magic" id="magic-toggle">Send Magic Link instead</button>

      <form id="magic-form" style="display:none;">
        <div class="form-group">
          <label for="magic-email">Email</label>
          <input type="email" id="magic-email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <button type="submit" class="btn-primary">Send Magic Link</button>
      </form>
    </div>

    <div class="footer-links">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
    <div class="back-home">
      <a href="index.html">&larr; Back to RouteIQ</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
