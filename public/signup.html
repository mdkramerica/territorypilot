<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Sign Up — RouteIQ</title>
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="logo"><span>Route</span><span class="iq">IQ</span></div>
    <p class="subtitle">Start optimizing your territory today.</p>
    <div class="trial-badge"><span>14-day free trial &middot; No credit card required</span></div>

    <div class="auth-card">
      <div class="error-msg" id="error"></div>

      <form id="signup-form">
        <div class="form-group">
          <label for="email">Work Email</label>
          <input type="email" id="email" placeholder="you@company.com" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" minlength="8" required />
        </div>
        <button type="submit" class="btn-primary" id="signup-btn">Create Free Account</button>
      </form>

      <div class="perks">
        <div class="perk">14 days free — full access</div>
        <div class="perk">No credit card to start</div>
        <div class="perk">Import your accounts in minutes</div>
        <div class="perk">Cancel anytime, no questions</div>
      </div>
    </div>

    <div class="footer-links">
      Already have an account? <a href="login.html">Log in</a>
    </div>
    <div class="back-home">
      <a href="index.html">&larr; Back to RouteIQ</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
